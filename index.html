<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Group Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  /* === 设计令牌 === */
  :root{
    --bg:#FBFAF7; --surface:#FFFFFF; --ink:#16161A; --muted:#6B6860;
    --line:#E8E4DB; --accent:#4B47E0; --accent-soft:#ECECFB;
    --ok:#2E7D5B; --ok-soft:#E5F1EB; --warn:#B4530E; --warn-soft:#FBEEE2;
    --radius:14px; --shadow:0 1px 2px rgba(20,20,30,.04), 0 8px 24px rgba(20,20,30,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:600px; margin:0 auto; padding:20px 18px 80px}
  header.top{display:flex; align-items:baseline; justify-content:space-between; gap:12px; padding:8px 0 18px}
  header.top h1{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:22px; letter-spacing:-.02em; margin:0}
  .adminlink{background:none; border:none; color:var(--muted); font-size:13px; cursor:pointer; padding:4px}
  .adminlink:hover{color:var(--ink)}

  /* 面包屑 */
  .crumbs{display:flex; flex-wrap:wrap; align-items:center; gap:6px; font-size:13px; color:var(--muted); margin-bottom:16px; min-height:18px}
  .crumbs button{background:none; border:none; color:var(--accent); cursor:pointer; padding:0; font:inherit}
  .crumbs span.sep{color:var(--line)}

  /* 卡片列表 */
  .list{display:flex; flex-direction:column; gap:10px}
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; text-align:left; width:100%; cursor:pointer; box-shadow:var(--shadow);
    transition:transform .12s ease, border-color .12s ease;
  }
  .card:hover{transform:translateY(-1px); border-color:#D8D3C8}
  .card:disabled{cursor:default; opacity:.6}
  .card .row{display:flex; align-items:center; justify-content:space-between; gap:10px}
  .card .name{font-weight:600}
  .card .sub{color:var(--muted); font-size:13px; margin-top:3px}
  .pill{font-size:12px; font-weight:600; padding:3px 9px; border-radius:999px; white-space:nowrap}
  .pill.open{background:var(--accent-soft); color:var(--accent)}
  .pill.locked{background:#F1EFEA; color:var(--muted)}
  .pill.cat{background:#F1EFEA; color:var(--muted)}

  /* 进度条 */
  .bar{height:6px; background:#F0EDE6; border-radius:999px; margin-top:12px; overflow:hidden}
  .bar > i{display:block; height:100%; background:var(--accent); border-radius:999px}

  /* set 名额网格 */
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px}
  .slot{
    border:1px solid var(--line); border-radius:12px; padding:13px 14px; background:var(--surface);
    text-align:left; cursor:pointer; transition:border-color .12s ease;
  }
  .slot:hover{border-color:var(--accent)}
  .slot .m{font-weight:600}
  .slot .s{font-size:12px; color:var(--muted); margin-top:2px}
  .slot.taken{background:#F7F5F0; cursor:default; border-style:dashed}
  .slot.taken:hover{border-color:var(--line)}

  /* claim 表单 */
  .panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); margin-top:14px}
  .panel h3{margin:0 0 12px; font-family:'Space Grotesk',sans-serif; font-size:17px}
  label{display:block; font-size:13px; color:var(--muted); margin:10px 0 5px}
  input{width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; background:#fff}
  input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .btn{appearance:none; border:none; border-radius:10px; padding:12px 16px; font:inherit; font-weight:600; cursor:pointer}
  .btn.primary{background:var(--accent); color:#fff; width:100%; margin-top:16px}
  .btn.primary:disabled{opacity:.5; cursor:default}
  .btn.ghost{background:#F1EFEA; color:var(--ink)}

  .note{font-size:13px; padding:10px 12px; border-radius:10px; margin-top:12px}
  .note.err{background:var(--warn-soft); color:var(--warn)}
  .note.ok{background:var(--ok-soft); color:var(--ok)}
  .empty{color:var(--muted); text-align:center; padding:40px 0; font-size:14px}
  .loading{color:var(--muted); text-align:center; padding:40px 0; font-size:14px}

  /* 后台 */
  .buyer{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); margin-bottom:12px}
  .buyer .bh{display:flex; justify-content:space-between; align-items:flex-start; gap:10px}
  .buyer .who{font-weight:600}
  .buyer .who small{display:block; color:var(--muted); font-weight:400; font-size:12px; margin-top:2px}
  .owe{text-align:right; white-space:nowrap}
  .owe .amt{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:18px}
  .owe .amt.clear{color:var(--ok)}
  .owe .amt.due{color:var(--warn)}
  .items{margin:12px 0 0; font-size:13px; color:var(--muted)}
  .items div{display:flex; justify-content:space-between; padding:3px 0; border-top:1px dashed var(--line)}
  .tags{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px}
  .tag{font-size:11px; padding:3px 8px; border-radius:999px}
  .tag.paid{background:var(--ok-soft); color:var(--ok)}
  .tag.unpaid{background:var(--warn-soft); color:var(--warn)}
  .toolbar{display:flex; gap:8px; margin:6px 0 16px; flex-wrap:wrap}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1 id="title">Group Order</h1>
    <button class="adminlink" id="adminToggle">管理后台</button>
  </header>

  <div class="crumbs" id="crumbs"></div>
  <div id="view"><div class="loading">载入中…</div></div>
</div>

<script>
/* =========================================================
   ⬇️ 唯一需要你改的地方：把下面引号里换成你的 Apps Script /exec 网址
   ========================================================= */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx9hrFqjCw1TjPiY9jtLmJv_rsKezvguI1N19zj9Zy-o5g6daEtCjJT8manL4TVaDXN/exec";

/* --------------- 与后端通信（CORS 友好） --------------- */
async function apiGet(params){
  const url = APPS_SCRIPT_URL + "?" + new URLSearchParams(params).toString();
  const r = await fetch(url);
  return r.json();
}
async function apiPost(payload){
  // 用 text/plain 避免浏览器对 Apps Script 发预检请求（否则会被 CORS 拦）
  const r = await fetch(APPS_SCRIPT_URL, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
  return r.json();
}

/* --------------- 全局状态 --------------- */
let CURRENCY = "¥";
let state = { view:"campaigns", campaign:null, store:null, set:null };
const view = document.getElementById("view");
const crumbsEl = document.getElementById("crumbs");

function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstChild; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function money(n){ return CURRENCY + (Math.round((Number(n)||0)*100)/100); }

/* --------------- 面包屑 --------------- */
function renderCrumbs(){
  crumbsEl.innerHTML = "";
  if(state.view==="admin"){ crumbsEl.appendChild(el(`<button data-go="campaigns">← 返回 claim 页面</button>`)); bindCrumbs(); return; }
  const parts=[];
  parts.push(`<button data-go="campaigns">全部团</button>`);
  if(state.campaign){ parts.push(`<span class="sep">/</span><button data-go="stores">${esc(state.campaign.name)}</button>`); }
  if(state.store){ parts.push(`<span class="sep">/</span><button data-go="sets">${esc(state.store.name)}</button>`); }
  if(state.set){ parts.push(`<span class="sep">/</span><span>${esc(state.set.name)}</span>`); }
  crumbsEl.innerHTML = parts.join("");
  bindCrumbs();
}
function bindCrumbs(){
  crumbsEl.querySelectorAll("[data-go]").forEach(b=>{
    b.onclick=()=>{ const g=b.dataset.go;
      if(g==="campaigns"){ state={view:"campaigns",campaign:null,store:null,set:null}; loadCampaigns(); }
      else if(g==="stores"){ state.store=null; state.set=null; state.view="stores"; loadStores(); }
      else if(g==="sets"){ state.set=null; state.view="sets"; loadSets(); }
    };
  });
}

/* --------------- 各级页面 --------------- */
async function loadConfig(){
  if(APPS_SCRIPT_URL.startsWith("PASTE_")){
    view.innerHTML = `<div class="note err">还没接上后端：请打开 index.html，把 APPS_SCRIPT_URL 换成你的 Apps Script 网址。</div>`;
    return false;
  }
  try{
    const c = await apiGet({action:"config"});
    if(c.title){ document.getElementById("title").textContent=c.title; document.title=c.title; }
    if(c.currency) CURRENCY=c.currency;
    return true;
  }catch(e){
    view.innerHTML = `<div class="note err">连不上后端，检查网址是否正确、是否已部署为「任何人」可访问。</div>`;
    return false;
  }
}

async function loadCampaigns(){
  state.view="campaigns"; renderCrumbs(); view.innerHTML=`<div class="loading">载入中…</div>`;
  const res = await apiGet({action:"campaigns"});
  if(!res.ok){ return showErr(res.error); }
  if(!res.campaigns.length){ view.innerHTML=`<div class="empty">现在没有进行中的团。</div>`; return; }
  const list = el(`<div class="list"></div>`);
  res.campaigns.forEach(c=>{
    const card = el(`<button class="card"><div class="row"><span class="name">${esc(c.name)}</span>${c.category?`<span class="pill cat">${esc(c.category)}</span>`:""}</div></button>`);
    card.onclick=()=>{ state.campaign=c; loadStores(); };
    list.appendChild(card);
  });
  view.innerHTML=""; view.appendChild(list);
}

async function loadStores(){
  state.view="stores"; renderCrumbs(); view.innerHTML=`<div class="loading">载入中…</div>`;
  const res = await apiGet({action:"stores", campaignId:state.campaign.id});
  if(!res.ok){ return showErr(res.error); }
  if(!res.stores.length){ view.innerHTML=`<div class="empty">这个团还没有店家。</div>`; return; }
  const list = el(`<div class="list"></div>`);
  res.stores.forEach(s=>{
    const card = el(`<button class="card">
      <div class="row"><span class="name">${esc(s.name)}</span><span class="pill open">${money(s.price)}</span></div>
      ${s.pob?`<div class="sub">${esc(s.pob)}</div>`:""}</button>`);
    card.onclick=()=>{ state.store=s; loadSets(); };
    list.appendChild(card);
  });
  view.innerHTML=""; view.appendChild(list);
}

async function loadSets(){
  state.view="sets"; renderCrumbs(); view.innerHTML=`<div class="loading">载入中…</div>`;
  const res = await apiGet({action:"sets", storeId:state.store.id});
  if(!res.ok){ return showErr(res.error); }
  if(!res.sets.length){ view.innerHTML=`<div class="empty">这个店家还没有 set。</div>`; return; }
  const list = el(`<div class="list"></div>`);
  res.sets.forEach(s=>{
    const pct = Math.round(100*s.filled/s.capacity);
    const card = el(`<button class="card" ${s.locked?"disabled":""}>
      <div class="row"><span class="name">${esc(s.name)}</span>
      <span class="pill ${s.locked?"locked":"open"}">${s.locked?"已锁定":"还差 "+(s.capacity-s.filled)}</span></div>
      <div class="sub">${s.filled} / ${s.capacity} 已 claim</div>
      <div class="bar"><i style="width:${pct}%"></i></div></button>`);
    if(!s.locked){ card.onclick=()=>{ state.set={id:s.id,name:s.name}; loadSet(); }; }
    list.appendChild(card);
  });
  view.innerHTML=""; view.appendChild(list);
}

async function loadSet(){
  state.view="set"; renderCrumbs(); view.innerHTML=`<div class="loading">载入中…</div>`;
  const res = await apiGet({action:"set", setId:state.set.id});
  if(!res.ok){ return showErr(res.error); }
  state.set.name = res.name;
  const container = el(`<div></div>`);
  if(res.locked) container.appendChild(el(`<div class="note ok">这个 set 已满并锁定。</div>`));
  const grid = el(`<div class="grid"></div>`);
  res.slots.forEach(slot=>{
    if(slot.taken){
      grid.appendChild(el(`<div class="slot taken"><div class="m">${esc(slot.member)}</div><div class="s">已被 ${esc(slot.by)} claim</div></div>`));
    }else{
      const s = el(`<button class="slot"><div class="m">${esc(slot.member)}</div><div class="s">点这里 claim →</div></button>`);
      s.onclick=()=>openClaim(slot.member);
      grid.appendChild(s);
    }
  });
  container.appendChild(grid);
  container.appendChild(el(`<div id="claimArea"></div>`));
  view.innerHTML=""; view.appendChild(container);
}

/* --------------- claim 表单 --------------- */
function openClaim(member){
  const area = document.getElementById("claimArea");
  area.innerHTML="";
  const f = el(`<div class="panel">
    <h3>Claim「${esc(member)}」· ${esc(state.store.name)}</h3>
    <label>你的名字 *</label><input id="f_name" autocomplete="name" />
    <label>Instagram（选填）</label><input id="f_ig" placeholder="@yourhandle" />
    <label>邮箱 *（用来联系你确认订单）</label><input id="f_email" type="email" autocomplete="email" />
    <button class="btn primary" id="f_submit">确认 claim</button>
    <div id="f_msg"></div>
  </div>`);
  area.appendChild(f);
  f.scrollIntoView({behavior:"smooth", block:"center"});
  document.getElementById("f_submit").onclick=()=>submitClaim(member);
}

async function submitClaim(member){
  const btn=document.getElementById("f_submit");
  const msg=document.getElementById("f_msg");
  const name=document.getElementById("f_name").value.trim();
  const ig=document.getElementById("f_ig").value.trim();
  const email=document.getElementById("f_email").value.trim();
  msg.innerHTML="";
  if(!name){ msg.innerHTML=`<div class="note err">请填写名字。</div>`; return; }
  if(!email||email.indexOf("@")<0){ msg.innerHTML=`<div class="note err">请填写有效邮箱。</div>`; return; }
  btn.disabled=true; btn.textContent="提交中…";
  const res = await apiPost({action:"claim", setId:state.set.id, member, buyerName:name, buyerIG:ig, buyerEmail:email});
  if(res.ok){
    msg.innerHTML=`<div class="note ok">claim 成功！${res.locked?"这个 set 现在满了，已锁定。":""}</div>`;
    setTimeout(loadSet, 900);
  }else{
    btn.disabled=false; btn.textContent="确认 claim";
    msg.innerHTML=`<div class="note err">${esc(res.error||"出错了，再试一次")}</div>`;
  }
}

/* --------------- 管理后台（只读汇总，不发任何通知） --------------- */
document.getElementById("adminToggle").onclick=()=>openAdmin();

function openAdmin(){
  state.view="admin"; renderCrumbs();
  const saved = sessionStorage.getItem("gom_pc") || "";
  view.innerHTML="";
  const p = el(`<div class="panel">
    <h3>管理后台</h3>
    <label>管理员口令（在 Config 表里设置）</label>
    <input id="pc" type="password" value="${esc(saved)}" />
    <button class="btn primary" id="pc_go">进入</button>
    <div id="pc_msg"></div>
  </div>`);
  view.appendChild(p);
  document.getElementById("pc_go").onclick=loadAdmin;
  if(saved) loadAdmin();
}

async function loadAdmin(){
  const pc=document.getElementById("pc").value.trim();
  const msg=document.getElementById("pc_msg");
  if(!pc){ msg.innerHTML=`<div class="note err">请输入口令。</div>`; return; }
  msg.innerHTML=`<div class="loading">载入中…</div>`;
  const res = await apiGet({action:"summary", passcode:pc});
  if(!res.ok){
    msg.innerHTML=`<div class="note err">${res.error==="wrong-passcode"?"口令不对。":esc(res.error)}</div>`;
    return;
  }
  sessionStorage.setItem("gom_pc", pc);
  CURRENCY = res.currency || CURRENCY;
  renderAdmin(res);
}

function renderAdmin(res){
  view.innerHTML="";
  const bar = el(`<div class="toolbar"><button class="btn ghost" id="refreshBtn">刷新</button></div>`);
  view.appendChild(bar);
  document.getElementById("refreshBtn").onclick=loadAdmin;

  if(!res.buyers.length){ view.appendChild(el(`<div class="empty">还没有任何 claim。</div>`)); return; }

  res.buyers.forEach(b=>{
    const due = b.outstanding>0;
    const items = b.items.map(it=>`<div><span>${esc(it.campaign)} · ${esc(it.store)} · ${esc(it.member)}</span><span>${money(it.price)}</span></div>`).join("");
    const charges = b.charges.map(ch=>`<div><span>${esc(ch.label)} ${ch.paid?"":"（未付）"}</span><span>${money(ch.amount)}</span></div>`).join("");
    const tags = [];
    tags.push(`<span class="tag ${b.productPaid?"paid":"unpaid"}">产品${b.productPaid?"已付":"未付"}</span>`);
    b.charges.forEach(ch=>tags.push(`<span class="tag ${ch.paid?"paid":"unpaid"}">${esc(ch.label)}${ch.paid?"已付":"未付"}</span>`));

    const card = el(`<div class="buyer">
      <div class="bh">
        <div class="who">${esc(b.name||b.email)}<small>${esc(b.email)}${b.ig?" · "+esc(b.ig):""}</small></div>
        <div class="owe"><div class="amt ${due?"due":"clear"}">${due?money(b.outstanding):"已结清"}</div>
        <small style="color:var(--muted)">总额 ${money(b.grandTotal)}</small></div>
      </div>
      <div class="items">${items}${charges}</div>
      <div class="tags">${tags.join("")}</div>
    </div>`);
    view.appendChild(card);
  });
}

function showErr(e){ view.innerHTML=`<div class="note err">${esc(e||"出错了")}</div>`; }

/* --------------- 启动 --------------- */
(async function(){
  const ok = await loadConfig();
  if(ok) loadCampaigns();
})();
</script>
</body>
</html>
